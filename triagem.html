<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Triagem - USF Cabula VI</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header>
        <h1>Sistema de Triagem - USF Cabula VI</h1>
        <p>Preencha os dados abaixo para gerar a classificação de risco.</p>
    </header>

    <!-- ALERTA AUTOMÁTICO DE EMERGÊNCIA/URGÊNCIA -->
    <div id="alerta-topo"></div>

    <main>
        <form id="form-triagem">

            <h2>Dados do Paciente</h2>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" min="0" required>

            <label for="queixa">Queixa principal:</label>
            <input type="text" id="queixa" placeholder="Ex: dor no peito, convulsão, queda..." required>

            <h2>Comorbidades</h2>

            <div class="checkbox-list">
                <label><input type="checkbox" value="diabetes"> Diabetes</label>
                <label><input type="checkbox" value="hipertensao"> Hipertensão</label>
                <label><input type="checkbox" value="asma"> Asma</label>
                <label><input type="checkbox" value="dpoc"> DPOC</label>
                <label><input type="checkbox" value="epilepsia"> Epilepsia</label>
                <label><input type="checkbox" value="renal"> Doença renal crônica</label>
                <label><input type="checkbox" value="imuno"> Imunossuprimido</label>
                <label><input type="checkbox" value="cardiopatia"> Cardiopatia</label>
                <label><input type="checkbox" value="anticoagulante"> Uso de anticoagulante</label>
                <label><input type="checkbox" value="gestante"> Gestante</label>
            </div>

            <h2>Medicações em uso</h2>
            <textarea id="medicacoes" placeholder="Liste as medicações separadas por vírgula..."></textarea>

            <button type="button" id="btn-classificar">Gerar Classificação</button>

        </form>
    </main>

    <section id="resultado-final"></section>

    <script src="assets/js/ui.js"></script>
    <script src="assets/js/triagem.js"></script>

</body>
</html>
