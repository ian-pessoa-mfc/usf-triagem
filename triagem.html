<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Triagem</title>
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        .accordion-section {
            background: #f0f0f0;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }

        .accordion-title {
            font-weight: bold;
            cursor: pointer;
            padding: 10px;
            background: #d9d9d9;
            border-radius: 6px;
        }

        .accordion-content {
            display: none;
            padding: 10px;
            background: white;
        }
    </style>
</head>

<body>

<header>
    <h1>Sistema de Triagem</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="triagem.html">Nova Triagem</a>
        <a href="triagens.html">Triagens Registradas</a>
    </nav>
</header>

<main>

    <h2>Realizar triagem</h2>

    <form id="formTriagem">

        <label>Nome do paciente:</label>
        <input type="text" id="nome" required>

        <label>Idade:</label>
        <input type="number" id="idade" required>

        <label>Queixa principal:</label>

        <select id="queixa" required>
            <option value="">Selecione...</option>

            <optgroup label="⚠️ EMERGÊNCIAS">
                <option value="convulsao">Convulsão</option>
                <option value="dor_toracica_intensa">Dor torácica intensa</option>
                <option value="dispneia_grave">Falta de ar grave</option>
                <option value="hemorragia_ativa">Hemorragia ativa</option>
                <option value="inconsciencia">Perda de consciência</option>
                <option value="suspeita_avc">Suspeita de AVC</option>
                <option value="anafilaxia">Anafilaxia</option>
                <option value="abdominal_agudo">Abdome agudo</option>
                <option value="trauma_grave">Trauma grave</option>
            </optgroup>

            <optgroup label="🫁 Respiratórias">
                <option value="dispneia">Dispneia leve/moderada</option>
                <option value="tosse">Tosse</option>
                <option value="sibilos">Chiado</option>
                <option value="resfriado">Sintomas gripais</option>
                <option value="febre_respiratoria">Febre com sintomas respiratórios</option>
            </optgroup>

            <optgroup label="🧠 Neurológicas">
                <option value="cefaleia">Cefaleia</option>
                <option value="tontura">Tontura</option>
                <option value="sincope">Síncope</option>
                <option value="formigamento">Formigamento</option>
            </optgroup>

            <optgroup label="❤️ Cardiovasculares">
                <option value="dor_toracica_leve">Dor torácica leve</option>
                <option value="palpitacoes">Palpitações</option>
                <option value="edema">Edema em membros</option>
            </optgroup>

            <optgroup label="🍽 Gastrointestinais">
                <option value="dor_abdominal">Dor abdominal</option>
                <option value="diarreia">Diarreia</option>
                <option value="vomito">Vômitos</option>
                <option value="nausea">Náusea</option>
            </optgroup>

            <optgroup label="🚽 Urinário">
                <option value="disuria">Dor ao urinar</option>
                <option value="polaciuria">Urinar muitas vezes</option>
                <option value="lombalgia">Dor lombar</option>
                <option value="hematuria">Urina com sangue</option>
            </optgroup>

            <optgroup label="🧴 Dermatológicas">
                <option value="exantema">Exantema</option>
                <option value="prurido">Prurido</option>
                <option value="lesoes_pele">Lesões de pele</option>
            </optgroup>

            <optgroup label="🍼 Pediatria">
                <option value="febre_crianca">Febre em criança</option>
                <option value="tosse_crianca">Tosse em criança</option>
                <option value="vomito_crianca">Vômitos em criança</option>
                <option value="irritabilidade">Irritabilidade</option>
            </optgroup>

            <optgroup label="👩‍🍼 Gineco/Obstétricas">
                <option value="dor_pelvica">Dor pélvica</option>
                <option value="corrimento">Corrimento vaginal</option>
                <option value="sangramento_vaginal">Sangramento vaginal</option>
            </optgroup>

            <optgroup label="🦴 Ortopédicas">
                <option value="dor_costas">Dor nas costas</option>
                <option value="entorse">Entorse</option>
                <option value="trauma_leve">Trauma leve</option>
            </optgroup>

            <optgroup label="🗂 Outros">
                <option value="mal_estar">Mal estar</option>
                <option value="ansiedade">Ansiedade</option>
                <option value="outros">Outros</option>
            </optgroup>
        </select>
