<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Triagens Registradas</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header>
    <h1>Triagens Registradas</h1>

    <nav>
        <a href="index.html">Início</a>
        <a href="triagem.html">Nova Triagem</a>
    </nav>
</header>

<main>
    <h2>Lista de atendimentos já realizados</h2>

    <button onclick="apagarTodas()">Apagar Todas as Triagens</button>
    <button onclick="window.location.href='triagem.html'">Voltar para a Triagem</button>

    <div id="listaTriagens" style="margin-top: 30px;"></div>
</main>

<script src="assets/js/triagem.js"></script>

<script>
function apagarTodas() {
    localStorage.removeItem("triagens");
    alert("Triagens apagadas!");
    location.reload();
}
</script>

</body>
</html>
